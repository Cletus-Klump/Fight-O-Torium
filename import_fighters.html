<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fighter Import Tool</title>
<style>
body { background: #0a0a0a; color: #e8e8e8; font-family: monospace; padding: 24px; }
button { background: #e8c84a; color: #000; border: none; padding: 10px 24px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-right: 10px; }
button:disabled { background: #555; color: #999; cursor: not-allowed; }
#log { margin-top: 20px; font-size: 12px; line-height: 1.8; max-height: 600px; overflow-y: auto; }
.ok { color: #4ae87a; }
.err { color: #e84a4a; }
.info { color: #e8c84a; }
#progress { font-size: 16px; margin: 12px 0; }
</style>
</head>
<body>
<h2 style="font-family: sans-serif; color: #e8c84a;">Fight-O-Torium — Fighter Import</h2>
<p style="color: #999; font-size: 13px;">63 fighters ready to import. Duplicates (same name) will be skipped.</p>
<div id="progress"></div>
<button id="runBtn" onclick="runImport()">▶ Run Import</button>
<div id="log"></div>

<script>
const SUPABASE_URL = 'https://ljtdmceosmqdlehrlgvv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdGRtY2Vvc21xZGxlaHJsZ3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDEyMDMsImV4cCI6MjA4Nzk3NzIwM30.4VPTKVnYlGw9rIER7-zDvGRI-1xRJ9ndDcsTG0iF00I';
const H = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

const FIGHTERS = EOF
python3 /home/claude/build_import.py 2>/dev/null >> /mnt/user-data/outputs/import_fighters.html
cat << 'EOF' >> /mnt/user-data/outputs/import_fighters.html
;

function log(msg, type='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;

  // Fetch existing fighters to check for duplicates
  log('Fetching existing fighters...');
  const res = await fetch(`${SUPABASE_URL}/rest/v1/fighters?select=name`, { headers: H });
  const existing = await res.json();
  const existingNames = new Set(existing.map(f => f.name.toLowerCase()));
  log(`Found ${existingNames.size} existing fighters in database.`);

  let inserted = 0, skipped = 0, errors = 0;

  for (let i = 0; i < FIGHTERS.length; i++) {
    const f = FIGHTERS[i];
    document.getElementById('progress').textContent = `Processing ${i + 1} / ${FIGHTERS.length}...`;

    if (existingNames.has(f.name.toLowerCase())) {
      log(`⏭ SKIP — ${f.name} (already exists)`, 'info');
      skipped++;
      continue;
    }

    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/fighters`, {
        method: 'POST',
        headers: { ...H, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ ...f, created_at: new Date().toISOString(), updated_at: new Date().toISOString() })
      });
      if (!r.ok) {
        const err = await r.text();
        log(`✕ ERROR — ${f.name}: ${err}`, 'err');
        errors++;
      } else {
        log(`✓ ${f.name} (${f.weight_class}) — ${f.flag_type}`, 'ok');
        inserted++;
      }
    } catch(e) {
      log(`✕ ERROR — ${f.name}: ${e.message}`, 'err');
      errors++;
    }

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 100));
  }

  document.getElementById('progress').textContent = `Done. ${inserted} inserted, ${skipped} skipped, ${errors} errors.`;
  log(`\n✅ Import complete — ${inserted} inserted, ${skipped} skipped, ${errors} errors.`, 'ok');
  btn.disabled = false;
  btn.textContent = '✓ Done';
}
</script>
</body>
</html>
