<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight-O-Torium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Titan+One&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;--border:#2a2a2a;--border2:#333333;--text:#e8e8e8;--text2:#999999;--text3:#555555;--accent:#e8c84a;--accent2:#c4a832;--red:#e84a4a;--green:#4ae87a;--blue:#4a8ae8;--orange:#e8884a;--purple:#884ae8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;}
.nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:var(--text2);font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;cursor:pointer;border-radius:4px;transition:all 0.15s}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--accent);background:var(--bg3)}
.conn-status{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.conn-dot.connected{background:var(--green)}
.conn-dot.error{background:var(--red)}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:calc(100vh - 56px)}
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex;flex-direction:column}

/* SEARCH BAR — shared top bar for fighters page */
.fighters-topbar{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.search-input{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:8px 14px;outline:none;transition:border-color 0.15s;width:280px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;}
.search-clear:hover{color:var(--text)}
.fighter-count-pill{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;margin-left:auto}

/* FIGHTERS PAGE — three states: weightclass grid, fighter list+detail, search results */
.fighters-body{flex:1;overflow:hidden;display:flex}

/* WEIGHT CLASS GRID */
.weightclass-grid{flex:1;overflow-y:auto;padding:28px 32px}
.weightclass-grid-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--text);margin-bottom:6px}
.weightclass-grid-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:28px;letter-spacing:1px}
.wc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.wc-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px 22px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.wc-card:hover{border-color:var(--accent);background:var(--bg3)}
.wc-card:hover .wc-arrow{opacity:1;transform:translateX(0)}
.wc-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text);margin-bottom:4px;line-height:1}
.wc-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.wc-flags{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.wc-flag-dot{width:6px;height:6px;border-radius:50%}
.wc-arrow{font-size:18px;color:var(--accent);position:absolute;right:16px;top:50%;transform:translateY(-50%) translateX(4px);opacity:0;transition:all 0.15s}

/* FIGHTER LIST + DETAIL (two panel) */
.fighters-two-panel{flex:1;overflow:hidden;display:flex}
.fighter-list-panel{width:260px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2)}
.fighter-list-panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg2);z-index:1}
.back-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0;line-height:1;transition:color 0.15s}
.back-btn:hover{color:var(--accent)}
.panel-wc-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--text)}
.fighter-list-items{padding:6px}
.fighter-list-item{padding:10px 12px;border-radius:4px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.fighter-list-item:hover{background:var(--bg3);border-color:var(--border)}
.fighter-list-item.active{background:var(--bg3);border-color:var(--accent)}
.fighter-list-name{font-weight:600;font-size:13px}
.fighter-detail-panel{flex:1;overflow-y:auto;padding:28px 32px}
.fighter-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.fighter-detail-empty-icon{font-size:48px;opacity:0.3}
.fighter-detail-empty-text{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase}

/* SEARCH RESULTS */
.search-results{flex:1;overflow-y:auto;padding:28px 32px}
.search-results-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.search-result-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between}
.search-result-item:hover{border-color:var(--accent);background:var(--bg3)}
.search-result-name{font-weight:600;font-size:14px;margin-bottom:2px}
.search-result-meta{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* FIGHTER DETAIL */
.fighter-detail-header{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:20px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
.fighter-name-display{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;line-height:1;margin-bottom:8px}
.fighter-meta-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.meta-value{font-size:14px;font-weight:600;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px}
.card-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.flag-detail-text{font-size:14px;line-height:1.7;color:var(--text2)}
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
.history-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.history-table tr:last-child td{border-bottom:none}
.history-table tr:hover td{background:var(--bg3)}

/* CARDS PAGE */
.cards-page{flex:1;overflow-y:auto;padding:28px 32px}

/* COMPARE PAGE */
.compare-page{flex:1;overflow-y:auto;padding:28px 32px}

/* BADGES */
.flag-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-weight:700}
.flag-ASCENDING{background:rgba(74,232,122,0.15);color:var(--green)}
.flag-DESCENDING,.flag-FADING{background:rgba(232,74,74,0.15);color:var(--red)}
.flag-MONITOR{background:rgba(74,138,232,0.15);color:var(--blue)}
.flag-STANDOUT{background:rgba(232,136,74,0.15);color:var(--orange)}
.flag-AVOID{background:rgba(232,74,74,0.2);color:var(--red);border:1px solid rgba(232,74,74,0.3)}
.flag-NEUTRAL{background:rgba(255,255,255,0.05);color:var(--text3)}
.conf-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-weight:700}
.conf-Strong{background:rgba(74,232,122,0.15);color:var(--green)}
.conf-Lean{background:rgba(232,200,74,0.15);color:var(--accent)}
.conf-Tossup{background:rgba(74,138,232,0.15);color:var(--blue)}
.conf-Pass{background:rgba(255,255,255,0.05);color:var(--text3)}
.parlay-tag{font-family:'JetBrains Mono',monospace;font-size:9px;background:rgba(136,74,232,0.15);color:var(--purple);padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:1px}
.result-W{color:var(--green);font-weight:700}
.result-L{color:var(--red);font-weight:700}
.result-P{color:var(--text3);font-weight:700}
.line-display{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text)}
.line-display.positive{color:var(--green)}
.line-display.negative{color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:4px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;cursor:pointer;border:none;transition:all 0.15s;text-transform:uppercase}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(232,74,74,0.1);color:var(--red);border:1px solid rgba(232,74,74,0.2)}
.btn-danger:hover{background:rgba(232,74,74,0.2)}
.btn-sm{padding:5px 12px;font-size:11px}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:28px;width:560px;max-width:90vw;max-height:85vh;overflow-y:auto;transform:translateY(10px);transition:transform 0.2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--text)}
.divider{height:1px;background:var(--border);margin:20px 0}
.form-grid{display:grid;gap:16px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.form-input,.form-select,.form-textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color 0.15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px}
.sidebar-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}

/* PICKS */
.pick-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px}
.pick-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pick-fighters{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.pick-details{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:8px}
.failure-mode-box{background:var(--bg3);border-left:2px solid var(--orange);padding:10px 14px;border-radius:0 4px 4px 0;font-size:12px;color:var(--text2);margin-top:10px;font-style:italic}
.failure-mode-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--orange);margin-bottom:4px;font-style:normal}
.card-event{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.card-event-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.card-event-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.card-event-meta{display:flex;gap:16px;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.card-record{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1;color:var(--text)}
.page-subtitle{font-size:13px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.fighter-link{color:var(--accent);cursor:pointer;border-bottom:1px solid transparent;transition:border-color 0.15s;}
.fighter-link:hover{border-bottom-color:var(--accent);}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}

/* UTILS */
.loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:12px;padding:20px}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.empty-state-text{font-size:15px;margin-bottom:6px;color:var(--text2)}
.empty-state-sub{font-size:12px;font-family:'JetBrains Mono',monospace}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:12px 16px;font-size:13px;animation:slideIn 0.2s ease;display:flex;align-items:center;gap:8px}
.toast.success{border-color:rgba(74,232,122,0.4)}
.toast.error{border-color:rgba(232,74,74,0.4)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* PARLAY BUILDER */
.parlay-builder{background:var(--bg2);border:1px solid var(--accent);border-radius:8px;margin-bottom:24px;overflow:hidden;}
.parlay-builder-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(232,200,74,0.04);}
.parlay-builder-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.parlay-builder-body{display:grid;grid-template-columns:1fr 320px;min-height:200px;}
.parlay-legs-panel{border-right:1px solid var(--border);padding:16px;}
.parlay-legs-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.parlay-pick-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;user-select:none;}
.parlay-pick-row:hover{border-color:var(--border2);background:var(--bg3);}
.parlay-pick-row.selected{border-color:var(--accent);background:rgba(232,200,74,0.06);}
.parlay-pick-row.selected .parlay-leg-check{background:var(--accent);border-color:var(--accent);color:#000;}
.parlay-pick-row.pass-pick{opacity:0.35;cursor:not-allowed;}
.parlay-leg-check{width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all 0.15s;}
.parlay-leg-fighter{flex:1;font-weight:600;font-size:13px;}
.parlay-leg-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.parlay-calc-panel{padding:20px;display:flex;flex-direction:column;gap:0;}
.parlay-calc-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.parlay-odds-display{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;color:var(--accent);line-height:1;margin-bottom:4px;}
.parlay-odds-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:16px;}
.parlay-leg-summary{margin-bottom:16px;flex:1;}
.parlay-leg-summary-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.parlay-leg-summary-item:last-child{border-bottom:none;}
.parlay-leg-summary-name{font-size:12px;font-weight:600;}
.parlay-leg-summary-detail{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.parlay-leg-failure{font-size:11px;color:var(--orange);font-style:italic;margin-top:2px;line-height:1.4;}
.parlay-save-row{display:flex;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid var(--border);}
.parlay-result-row{display:flex;gap:6px;margin-top:4px;}
.parlay-result-btn{flex:1;padding:6px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;text-align:center;}
.parlay-result-btn:hover{border-color:var(--border2);color:var(--text);}
.parlay-result-btn.hit{border-color:var(--green);background:rgba(74,232,122,0.1);color:var(--green);}
.parlay-result-btn.bust{border-color:var(--red);background:rgba(232,74,74,0.1);color:var(--red);}
.saved-parlays-section{margin-bottom:20px;}
.saved-parlay-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:8px;}
.saved-parlay-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.saved-parlay-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.saved-parlay-odds{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}
.saved-parlay-legs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.parlay-leg-pill{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <svg width="340" height="44" viewBox="0 0 340 44" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hr2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ff6b6b"/><stop offset="100%" style="stop-color:#990000"/></linearGradient>
        <linearGradient id="hb2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88ccff"/><stop offset="100%" style="stop-color:#004499"/></linearGradient>
        <linearGradient id="hp2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#cc88ff"/><stop offset="100%" style="stop-color:#550099"/></linearGradient>
        <linearGradient id="hw2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#ffffff"/><stop offset="100%" style="stop-color:#8888cc"/></linearGradient>
        <linearGradient id="hoct" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff4444"/><stop offset="50%" style="stop-color:#aa33cc"/><stop offset="100%" style="stop-color:#3366ff"/></linearGradient>
        <filter id="hgl"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

<script>
const SUPABASE_URL='https://ljtdmceosmqdlehrlgvv.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdGRtY2Vvc21xZGxlaHJsZ3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDEyMDMsImV4cCI6MjA4Nzk3NzIwM30.4VPTKVnYlGw9rIER7-zDvGRI-1xRJ9ndDcsTG0iF00I';
const H={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

async function sbGet(t,q=''){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbPost(t,d){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbPatch(t,id,d){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbDelete(t,id){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text())}

let allFighters=[],allCards=[],allPicks=[],selectedFighterId=null,editingFighterId=null,currentCardId=null,currentWC=null;

const weightOrder=['Strawweight','Flyweight','Bantamweight','Featherweight','Lightweight','Welterweight','Middleweight','Light Heavyweight','Heavyweight',"Women's Strawweight","Women's Flyweight","Women's Bantamweight","Women's Featherweight"];

const flagEmoji={ASCENDING:'🟢',DESCENDING:'🔴',FADING:'🔴',MONITOR:'🔵',STANDOUT:'⭐',AVOID:'❌',NEUTRAL:'⚪'};

async function init(){
  try{
    await Promise.all([loadFighters(),loadCards(),loadPicks()]);
    setConn(true);
  }catch(e){setConn(false);toast('Connection error','error');console.error(e)}
}

function setConn(ok){
  document.getElementById('connDot').className='conn-dot '+(ok?'connected':'error');
  document.getElementById('connLabel').textContent=ok?'connected':'offline';
}

function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='cards'){renderCards();document.getElementById('cardsListView').style.display='block';document.getElementById('cardsDetailView').style.display='none';}
  if(page==='compare')populateCompareSelects();
  if(page==='fighters'){
    // reset to grid view if coming back
    const search=document.getElementById('fighterSearch').value;
    if(!search) showWCGrid();
  }
}

// ---- FIGHTER LOADING ----
async function loadFighters(){
  allFighters=await sbGet('fighters','order=name.asc');
  document.getElementById('fighterCountDisplay').textContent=allFighters.length+' fighters';
  document.getElementById('wcGridSub').textContent=allFighters.length+' fighters tracked';
  renderWCGrid();
  populateCompareSelects();
}

// ---- WEIGHT CLASS GRID ----
function renderWCGrid(){
  const grid=document.getElementById('wcGridCards');
  const groups={};
  allFighters.forEach(f=>{
    const k=f.weight_class||'Unknown';
    if(!groups[k])groups[k]=[];
    groups[k].push(f);
  });
  // Sort by weight order
  const sorted=Object.entries(groups).sort((a,b)=>{
    const ai=weightOrder.indexOf(a[0]),bi=weightOrder.indexOf(b[0]);
    if(ai===-1&&bi===-1)return a[0].localeCompare(b[0]);
    if(ai===-1)return 1;
    if(bi===-1)return -1;
    return ai-bi;
  });
  grid.innerHTML=sorted.map(([wc,fighters])=>{
    const asc=fighters.filter(f=>f.flag_type==='ASCENDING').length;
    const desc=fighters.filter(f=>['DESCENDING','FADING'].includes(f.flag_type)).length;
    const mon=fighters.filter(f=>f.flag_type==='MONITOR').length;
    let dots='';
    for(let i=0;i<Math.min(asc,5);i++)dots+=`<div class="wc-flag-dot" style="background:var(--green)"></div>`;
    for(let i=0;i<Math.min(desc,5);i++)dots+=`<div class="wc-flag-dot" style="background:var(--red)"></div>`;
    for(let i=0;i<Math.min(mon,5);i++)dots+=`<div class="wc-flag-dot" style="background:var(--blue)"></div>`;
    return `<div class="wc-card" onclick="openWC('${wc.replace(/'/g,"\\'")}')">
      <div class="wc-name">${wc}</div>
      <div class="wc-count">${fighters.length} fighter${fighters.length!==1?'s':''}</div>
      ${dots?`<div class="wc-flags">${dots}</div>`:''}
      <div class="wc-arrow">→</div>
    </div>`;
  }).join('');
}

function showWCGrid(){
  document.getElementById('wcGrid').style.display='block';
  document.getElementById('twoPanel').style.display='none';
  document.getElementById('searchResults').style.display='none';
  currentWC=null;
  selectedFighterId=null;
}

function openWC(wc){
  currentWC=wc;
  selectedFighterId=null;
  const fighters=allFighters.filter(f=>f.weight_class===wc).sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('panelWcLabel').textContent=wc;
  document.getElementById('fighterListItems').innerHTML=fighters.map(f=>`
    <div class="fighter-list-item" id="fli-${f.id}" onclick="selectFighter('${f.id}')">
      <div class="fighter-list-name">${f.name}</div>
      <span title="${f.flag_type||''}" style="font-size:12px;">${flagEmoji[f.flag_type]||''}</span>
    </div>`).join('');
  document.getElementById('fighterDetailPanel').innerHTML=`<div class="fighter-detail-empty"><div class="fighter-detail-empty-icon">🥊</div><div class="fighter-detail-empty-text">Select a fighter</div></div>`;
  document.getElementById('wcGrid').style.display='none';
  document.getElementById('twoPanel').style.display='flex';
  document.getElementById('searchResults').style.display='none';
}

function backToGrid(){
  showWCGrid();
  document.getElementById('fighterSearch').value='';
  document.getElementById('searchClear').style.display='none';
}

// ---- SEARCH ----
function onSearchInput(){
  const q=document.getElementById('fighterSearch').value.trim();
  document.getElementById('searchClear').style.display=q?'inline':'none';
  if(!q){
    // Return to current state
    if(currentWC){
      document.getElementById('searchResults').style.display='none';
      document.getElementById('twoPanel').style.display='flex';
    } else {
      showWCGrid();
    }
    return;
  }
  const results=allFighters.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('wcGrid').style.display='none';
  document.getElementById('twoPanel').style.display='none';
  document.getElementById('searchResults').style.display='block';
  document.getElementById('searchResultsTitle').textContent=`${results.length} result${results!==1?'s':''} for "${q}"`;
  if(!results.length){
    document.getElementById('searchResultsGrid').innerHTML='<div style="color:var(--text3);font-family:JetBrains Mono,monospace;font-size:12px;">No fighters found</div>';
    return;
  }
  document.getElementById('searchResultsGrid').innerHTML=results.map(f=>`
    <div class="search-result-item" onclick="selectFighterFromSearch('${f.id}')">
      <div>
        <div class="search-result-name">${f.name}</div>
        <div class="search-result-meta">${f.weight_class||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${f.flag_type&&f.flag_type!=='NEUTRAL'?`<span class="flag-badge flag-${f.flag_type}">${f.flag_type}</span>`:''}
        <span style="font-size:12px;">${flagEmoji[f.flag_type]||''}</span>
      </div>
    </div>`).join('');
}

function clearSearch(){
  document.getElementById('fighterSearch').value='';
  document.getElementById('searchClear').style.display='none';
  if(currentWC){
    document.getElementById('searchResults').style.display='none';
    document.getElementById('twoPanel').style.display='flex';
  } else {
    showWCGrid();
  }
}

function selectFighterFromSearch(id){
  const f=allFighters.find(x=>x.id===id);
  if(!f)return;
  // Open the WC panel and select the fighter
  openWC(f.weight_class||'Unknown');
  selectFighter(id);
}

// ---- FIGHTER DETAIL ----
async function selectFighter(id){
  selectedFighterId=id;
  // Update list item highlights
  document.querySelectorAll('.fighter-list-item').forEach(el=>el.classList.remove('active'));

let parlaySelectedIds = new Set();

function americanToDecimal(line) {
  const n = parseInt(line);
  if (isNaN(n)) return null;
  return n > 0 ? (n / 100) + 1 : (100 / Math.abs(n)) + 1;
}

function decimalToAmerican(dec) {
  if (dec >= 2) return '+' + Math.round((dec - 1) * 100);
  return '-' + Math.round(100 / (dec - 1));
}

function calcParlayOdds(lines) {
  if (!lines.length) return null;
  const decimals = lines.map(americanToDecimal).filter(d => d !== null);
  if (!decimals.length) return null;
  const combined = decimals.reduce((acc, d) => acc * d, 1);
  return decimalToAmerican(combined);
}

function toggleParlayBuilder() {
  parlayBuilderOpen = !parlayBuilderOpen;
  parlaySelectedIds = new Set();
  const btn = document.getElementById('parlayBuilderBtn');
  if (parlayBuilderOpen) {
    btn.textContent = '✕ Close Builder';
    btn.classList.add('btn-secondary');
    renderParlayBuilder();
    renderSavedParlays();
  } else {
    btn.textContent = '⚡ Parlay Builder';
    document.getElementById('parlayBuilderSection').style.display = 'none';
    document.getElementById('savedParlaysSection').style.display = 'none';
  }
}

  const section = document.getElementById('parlayBuilderSection');
  const picks = allPicks.filter(p => p.card_id === currentCardId);
  const playablePicks = picks.filter(p => p.picked_fighter_id && p.line);

  section.innerHTML = `
    <div class="parlay-builder">
      <div class="parlay-builder-header">
        <div class="parlay-builder-title">⚡ Parlay Builder</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);">Click legs to add · Odds calculate live</div>
      </div>
      <div class="parlay-builder-body">
        <div class="parlay-legs-panel">
          <div class="parlay-legs-label">Available Legs — picks with lines</div>
          ${!playablePicks.length
            ? `<div style="color:var(--text3);font-size:13px;padding:12px 0;">No picks with lines logged yet. Add picks with a line to use the builder.</div>`
            : playablePicks.map(p => {
                const picked = allFighters.find(f => f.id === p.picked_fighter_id);
                const fA = allFighters.find(f => f.id === p.fighter_a_id);
                const fB = allFighters.find(f => f.id === p.fighter_b_id);
                const isPass = !p.picked_fighter_id;
                const isSelected = parlaySelectedIds.has(p.id);
                const lp = p.line && p.line.startsWith('+');
                const ln = p.line && p.line.startsWith('-');
                return `<div class="parlay-pick-row ${isSelected ? 'selected' : ''} ${isPass ? 'pass-pick' : ''}"
                  onclick="${isPass ? '' : `toggleParlayLeg('${p.id}')`}">
                  <div class="parlay-leg-check">${isSelected ? '✓' : ''}</div>
                  <div class="parlay-leg-fighter">
                    <div>${picked ? picked.name : 'PASS'}</div>
                    <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px;">
                      ${fA ? fA.name : '?'} vs ${fB ? fB.name : '?'}
                    </div>
                  </div>
                  <div class="parlay-leg-meta">
                    ${p.line ? `<span class="line-display ${lp ? 'positive' : ln ? 'negative' : ''}" style="font-size:13px;">${p.line}</span>` : ''}
                    ${p.confidence ? `<span class="conf-badge conf-${p.confidence}">${p.confidence}</span>` : ''}
                  </div>
                </div>`;
              }).join('')
          }
        </div>
        <div class="parlay-calc-panel" id="parlayCalcPanel">
          ${renderParlayCalc(playablePicks)}
        </div>
      </div>
    </div>`;
  section.style.display = 'block';
}

function renderParlayCalc(playablePicks) {
  const selected = (playablePicks || allPicks.filter(p => p.card_id === currentCardId && p.picked_fighter_id && p.line))
    .filter(p => parlaySelectedIds.has(p.id));
  const lines = selected.map(p => p.line).filter(Boolean);
  const odds = lines.length >= 2 ? calcParlayOdds(lines) : null;
  const isPositive = odds && odds.startsWith('+');

  return `
    <div class="parlay-calc-title">Live Calculation</div>
    <div class="parlay-odds-display" style="color:${odds ? (isPositive ? 'var(--green)' : 'var(--accent)') : 'var(--text3)'};">
      ${odds || (parlaySelectedIds.size < 2 ? '—' : 'N/A')}
    </div>
    <div class="parlay-odds-sub">${parlaySelectedIds.size} leg${parlaySelectedIds.size !== 1 ? 's' : ''} selected${odds ? ' · ' + parlaySelectedIds.size + '-leg parlay' : parlaySelectedIds.size < 2 ? ' · select 2+ to calculate' : ''}</div>
    <div class="parlay-leg-summary" id="parlayLegSummary">
      ${selected.map(p => {
        const picked = allFighters.find(f => f.id === p.picked_fighter_id);
        return `<div class="parlay-leg-summary-item">
          <div class="parlay-leg-summary-name">${picked ? picked.name : '—'} <span style="color:var(--text3);font-weight:400;">${p.line || ''}</span></div>
          <div class="parlay-leg-summary-detail">${p.confidence || ''} ${p.result ? '· <span style="color:' + (p.result==='W'?'var(--green)':'var(--red)') + ';">' + (p.result==='W'?'HIT':'MISS') + '</span>' : '· pending'}</div>
          ${p.failure_mode ? `<div class="parlay-leg-failure">⚠ ${p.failure_mode}</div>` : ''}
        </div>`;
      }).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0;">Select legs from the left to build your parlay.</div>'}
    </div>
    ${parlaySelectedIds.size >= 2 ? `
    <div class="parlay-save-row">
      <input type="text" class="form-input" id="parlayNameInput" placeholder='Name this parlay... e.g. "Parlay A"' style="font-size:13px;">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="saveParlayToCard()">Save Parlay</button>
      </div>
      ${selected.some(p => p.result) ? `
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:4px;">Quick Result</div>
      <div class="parlay-result-row">
        <div class="parlay-result-btn ${selected.every(p => p.result === 'W') ? 'hit' : ''}"
          onclick="markParlayQuickResult('HIT')">🟢 HIT</div>
        <div class="parlay-result-btn ${selected.some(p => p.result === 'L') ? 'bust' : ''}"
          onclick="markParlayQuickResult('BUST')">🔴 BUST</div>
      </div>` : ''}
    </div>` : ''}`;
}

function toggleParlayLeg(pickId) {
  if (parlaySelectedIds.has(pickId)) parlaySelectedIds.delete(pickId);
  else parlaySelectedIds.add(pickId);
  renderParlayBuilder();
  renderSavedParlays();
}

async function saveParlayToCard() {
  const name = document.getElementById('parlayNameInput')?.value.trim() || 'Untitled Parlay';
  const picks = allPicks.filter(p => p.card_id === currentCardId && p.picked_fighter_id && p.line);
  const selected = picks.filter(p => parlaySelectedIds.has(p.id));
  if (selected.length < 2) { toast('Select at least 2 legs', 'error'); return; }
  const lines = selected.map(p => p.line).filter(Boolean);
  const odds = calcParlayOdds(lines);
  const legNames = selected.map(p => {
    const f = allFighters.find(x => x.id === p.picked_fighter_id);
    return f ? f.name : p.id;
  });

  try {
    // Store in cards notes as a parlay record (using notes field as parlay storage)
    // We'll use a dedicated approach: store in Supabase cards table notes or use picks notes
    // Best approach: save as a special pick entry with parlay flag
    const parlayData = {
      card_id: currentCardId,
      fighter_a_id: selected[0].fighter_a_id,
      fighter_b_id: selected[0].fighter_b_id,
      picked_fighter_id: null,
      line: odds,
      confidence: 'Strong',
      parlay_candidate: true,
      notes: `PARLAY: ${name} | Legs: ${legNames.join(', ')} | Lines: ${lines.join(', ')} | Combined: ${odds}`,
      weight_class: null,
      result: null
    };
    // Tag each selected pick with a parlay identifier
    const parlayTag = `[PARLAY:${name}]`;
    for (const p of selected) {
      const newNotes = p.notes ? p.notes + ' ' + parlayTag : parlayTag;
      await sbPatch('picks', p.id, { parlay_candidate: true, notes: newNotes });
    }
    toast(`Parlay "${name}" saved`, 'success');
    await loadPicks();
    renderSavedParlays();
    renderCardPicksOnly();
  } catch(e) { toast('Error saving parlay: ' + e.message, 'error'); }
}

function markParlayQuickResult(result) {
  toast(`Parlay marked as ${result} — update individual pick results to track`, result === 'HIT' ? 'success' : 'error');
}

function renderSavedParlays() {
  const section = document.getElementById('savedParlaysSection');
  if (!parlayBuilderOpen) { section.style.display = 'none'; return; }
  const picks = allPicks.filter(p => p.card_id === currentCardId);
  // Find picks tagged with parlays
  const parlayMap = {};
  picks.forEach(p => {
    if (!p.notes) return;
    const matches = p.notes.match(/\[PARLAY:([^\]]+)\]/g);
    if (!matches) return;
    matches.forEach(m => {
      const name = m.replace('[PARLAY:', '').replace(']', '');
      if (!parlayMap[name]) parlayMap[name] = [];
      parlayMap[name].push(p);
    });
  });
  const parlayNames = Object.keys(parlayMap);
  if (!parlayNames.length) { section.style.display = 'none'; return; }

  section.innerHTML = `
    <div class="saved-parlays-section">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">Saved Parlays</div>
      ${parlayNames.map(name => {
        const legs = parlayMap[name];
        const lines = legs.map(p => p.line).filter(Boolean);
        const odds = lines.length >= 2 ? calcParlayOdds(lines) : null;
        const isPositive = odds && odds.startsWith('+');
        const results = legs.map(p => p.result).filter(Boolean);
        const allHit = results.length === legs.length && results.every(r => r === 'W');
        const anyMiss = results.some(r => r === 'L');
        const status = allHit ? 'HIT' : anyMiss ? 'BUST' : results.length ? 'PARTIAL' : 'PENDING';
        const statusColor = allHit ? 'var(--green)' : anyMiss ? 'var(--red)' : 'var(--text3)';
        return `<div class="saved-parlay-card">
          <div class="saved-parlay-header">
            <div class="saved-parlay-name">${name}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              ${odds ? `<div class="saved-parlay-odds" style="color:${isPositive ? 'var(--green)' : 'var(--accent)'};">${odds}</div>` : ''}
              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${statusColor};">${status}</div>
            </div>
          </div>
          <div class="saved-parlay-legs">
            ${legs.map(p => {
              const picked = allFighters.find(f => f.id === p.picked_fighter_id);
              const res = p.result;
              const rc = res === 'W' ? 'var(--green)' : res === 'L' ? 'var(--red)' : 'var(--text3)';
              return `<div class="parlay-leg-pill" style="color:${rc};border-color:${rc}20;">
                ${picked ? picked.name : '?'} ${p.line || ''} ${res ? '· ' + (res === 'W' ? 'HIT' : 'MISS') : ''}
              </div>`;
            }).join('')}
          </div>
          <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${legs.length} legs · ${results.length}/${legs.length} results in</div>
        </div>`;
      }).join('')}
    </div>`;
  section.style.display = 'block';
}

function renderCardPicksOnly() {
  const picks = allPicks.filter(p => p.card_id === currentCardId);
  if (!picks.length) {
    document.getElementById('cardDetailPicks').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎯</div><div class="empty-state-text">No picks logged for this card</div></div>';
    return;
  }
  document.getElementById('cardDetailPicks').innerHTML = picks.map(p => {
    const fA = allFighters.find(f => f.id === p.fighter_a_id);
    const fB = allFighters.find(f => f.id === p.fighter_b_id);
    const picked = allFighters.find(f => f.id === p.picked_fighter_id);
    const lp = p.line && p.line.startsWith('+'), ln = p.line && p.line.startsWith('-');
    const fighterLink = (f) => f ? `<span class="fighter-link" onclick="goToFighter('${f.id}')">${f.name}</span>` : '—';
    return `<div class="pick-card">
      <div class="pick-card-header">
        <div>
          <div class="pick-fighters">${fighterLink(fA)}<span style="color:var(--text3);font-size:14px;font-family:'Barlow',sans-serif;"> vs </span>${fighterLink(fB)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;">${p.weight_class || ''}</div>
        </div>
        <div style="text-align:right;">${p.result ? `<span class="result-${p.result}" style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;">${p.result === 'W' ? 'HIT' : p.result === 'L' ? 'MISS' : 'PASS'}</span>` : '<span style="color:var(--text3);font-size:12px;font-family:JetBrains Mono,monospace;">PENDING</span>'}</div>
      </div>
      <div class="pick-details">
        ${picked ? `<div style="font-size:13px;font-weight:600;">Pick: <span style="color:var(--accent);">${fighterLink(picked)}</span></div>` : '<div style="font-size:13px;color:var(--text3);">PASS</div>'}
        ${p.line ? `<span class="line-display ${lp ? 'positive' : ln ? 'negative' : ''}">${p.line}</span>` : ''}
        ${p.confidence ? `<span class="conf-badge conf-${p.confidence}">${p.confidence}</span>` : ''}
        ${p.parlay_candidate ? '<span class="parlay-tag">Parlay</span>' : ''}
        ${p.result_method ? `<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${p.result_method} ${p.result_round || ''}</span>` : ''}
      </div>
      ${p.failure_mode ? `<div class="failure-mode-box"><div class="failure-mode-label">Failure Mode Named</div>${p.failure_mode}</div>` : ''}
      ${p.notes ? `<div style="margin-top:10px;font-size:13px;color:var(--text2);">${p.notes}</div>` : ''}
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
