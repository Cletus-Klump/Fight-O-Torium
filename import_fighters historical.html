ut it wasn't close"}, {"name": "Carlos Hernandez", "weight_class": "Flyweight", "flag_type": "NEUTRAL", "flag_detail": "Fast, slick, smart. Overall, solid fighter. Nothing amazing, but no weaknesses", "notes": "Hernandez vs Bondar - Close fight, but overall Hernandez was faster and slicker. Bondar just didn't take advantage when he needed to. 30-27 Hernandez"}, {"name": "Denys Bondar", "weight_class": "Flyweight", "flag_type": "DESCENDING", "flag_detail": "Hard puncher, good skills, but mentally terrible. Do not bet on this guy", "notes": "Hernandez vs Bondar - Close fight, but overall Hernandez was faster and slicker. Bondar just didn't take advantage when he needed to. 30-27 Hernandez"}, {"name": "Kyung Ho Kang", "weight_class": "Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Good, smart, aggressive counterpuncher. Good BJJ", "notes": "Kang vs Quionez - Great first found. Quionez wobbles Kang, but gets caught overcomitting. Ends with Kang via RNC."}, {"name": "Cristian Quionez", "weight_class": "Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Strong, fast. Overaggressive, but will learn.", "notes": "Kang vs Quionez - Great first found. Quionez wobbles Kang, but gets caught overcomitting. Ends with Kang via RNC."}, {"name": "Payton Talbott", "weight_class": "Bantamweight", "flag_type": "ASCENDING", "flag_detail": "Really good Muay Thai fighter. They will compare him to O'Malley, but he's really just a lanky version of Prime Cerrone. Unreal cardio, good wrestling (can be exploited by top of division), great chin but chinny and will eventually get KO'd. \n\nSTUD. Tough AF", "notes": null}, {"name": "Caio Machado", "weight_class": "Heavyweight", "flag_type": "NEUTRAL", "flag_detail": "Won against a guy who didn't try at all. William Knight performance from the other guy. Machado is really bad and if he ever gets a fight, bet against his sorry ass\n\nBUM", "notes": null}, {"name": "Juiiana Miller", "weight_class": "Women's Flyweight", "flag_type": "NEUTRAL", "flag_detail": "Lol absolute bum. Uncoordinated, bad, slow, weak, dumb..the whole package. Came out to a RHCP song and it was super lame.", "notes": null}, {"name": "Luana Santos", "weight_class": "Women's Bantamweight", "flag_type": "DESCENDING", "flag_detail": "Got a finish against bum-ass Juliana Miller, but she's not very good either. The minute she steps up in competition, she's getting crushed. She'll have an inflated line next time, guarenteed", "notes": null}, {"name": "Martin Buday", "weight_class": "Heavyweight", "flag_type": "NEUTRAL", "flag_detail": "I really like Buday. He's smart and faster than you'd expect. Technical, well-rounded. Someone will eventually KO him, but he's gonna end up Top 10ish.", "notes": null}, {"name": "Bolaji Oki", "weight_class": "Lightweight", "flag_type": "NEUTRAL", "flag_detail": "Unreal explosion and striking. Killed a top level kickboxer. Unsure about total MMA skills, but he's going to kill most other strikers", "notes": null}, {"name": "Steven Nguyen", "weight_class": "Featherweight", "flag_type": "NEUTRAL", "flag_detail": "Great striker. Reminds me of a featherweight Cyril Gane. Not super mean, but still will beat anyone who isn't on his level and KO the dumber fighters. Good TD defense. He'll cruise to boring decisions mostly, but is high volume and high cardio. Cyril Gane vs Volkov", "notes": null}, {"name": "Jean Matsumoto", "weight_class": "Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Slick, tough, badass Muay Thai striker. Training since he was a kid b/c his dad owns a gym. BJJ black belt, thai champion. I feel like he'll wilt under a real pressure fighter who is pretty good, but he's going to beat most guys. Good BJJ, but can be taken down. Can get to his feet, but a great wrestler might keep him down", "notes": null}, {"name": "James Llontop", "weight_class": "Lightweight", "flag_type": "NEUTRAL", "flag_detail": "Kinda your stereotypical Peruvian striker. Good boxing, good leg kicks, great cardio, attack the body. Your classic good boxer, power kicks to the body/calves. Good BJJ and TDD. \n\nDoesn't feel too gritty. I think he'll lose some laughers due to effort. He's the guy you always take when he's -120 or better, but never take him as a bigger favorite", "notes": null}, {"name": "Tracy Cortez", "weight_class": "Women's Flyweight", "flag_type": "NEUTRAL", "flag_detail": "Athletic, good cardio, good chin. Will usually win tbh. Not a ton of power. A better Miranda Maverick.", "notes": null}, {"name": "Josh Friemd", "weight_class": "Middleweight", "flag_type": "NEUTRAL", "flag_detail": "Chiesa", "notes": null}, {"name": "Roman Kopylov", "weight_class": "Middleweight", "flag_type": "MONITOR", "flag_detail": "Middleweight Fiziev with takedown defense. Monitor closely.", "notes": null}, {"name": "Tamiris Vidal", "weight_class": "Women's Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Absolute bum. William Knight", "notes": null}, {"name": "Monserrat Rendon", "weight_class": "Women's Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "She's undefeated, but skill-less. Decent cardio I guess", "notes": null}, {"name": "Bill Algeo", "weight_class": "Featherweight", "flag_type": "NEUTRAL", "flag_detail": "He's good. Unorthodox and funky. Good kicks, good style for winning. Lanky and fights lanky. Chinny though. He's get caught eventually. Also not going to outskill the better fighters. He's about to hit his ceiling probably", "notes": null}, {"name": "Lucas Rocha", "weight_class": "Flyweight", "flag_type": "NEUTRAL", "flag_detail": "Terrible wrestling, but great at getting back up. Good cardio. Ridiculous wild striking. Timed a takedown and knocked some dude out in the second with a knee.", "notes": null}, {"name": "Torrez Finney", "weight_class": "Middleweight", "flag_type": "NEUTRAL", "flag_detail": "This guy is awesome. 5'8 MW with a 75 inch reach. Absolutely jacked, somehow good cardio. Good wrestling and BJJ. Looks like someone you'd create on a video game. Will eventually get knocked out, but will kill some people too. Trains with Trevor Peek. Different style but same attitude", "notes": null}, {"name": "Joshua Van", "weight_class": "Flyweight", "flag_type": "ASCENDING", "flag_detail": "Current Flyweight Champion", "notes": null}, {"name": "Viacheslav Borshchev", "weight_class": "Lightweight", "flag_type": "NEUTRAL", "flag_detail": "Obbviously great striker. TD defense looks slightly better. Not convinced it's good though\n\nUPDATE - Still not good", "notes": null}, {"name": "Alessandro Costa", "weight_class": "Flyweight", "flag_type": "NEUTRAL", "flag_detail": "Wild and kinda a bum, but could beat someone on a wild KO. Scary to bet against unless you are sure. Low fight IQ", "notes": null}, {"name": "Andre Muniz", "weight_class": "Middleweight", "flag_type": "NEUTRAL", "flag_detail": "Terrible fight IQ. Great BJJ (apparently..not that I've seen), but so dumb and bad.", "notes": null}, {"name": "Kevin Jousett", "weight_class": "Welterweight", "flag_type": "NEUTRAL", "flag_detail": null, "notes": null}, {"name": "Jonathan Micallef", "weight_class": "Welterweight", "flag_type": "NEUTRAL", "flag_detail": "Dude sucks. Dumb kickboxer. Might get a lucky KO or something, but sucks. Low IQ", "notes": null}, {"name": "Kody Steele", "weight_class": "Lightweight", "flag_type": "NEUTRAL", "flag_detail": "Power, low fight IQ.", "notes": null}, {"name": "Rong Zhu", "weight_class": "Lightweight", "flag_type": "NEUTRAL", "flag_detail": "Getting better. Good striking. Tough. He'll get sparked by someone though.", "notes": null}, {"name": "Aleksandre Topuria", "weight_class": "Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Solid. Worse Ilya", "notes": null}, {"name": "Colby Thicknesse", "weight_class": "Bantamweight", "flag_type": "NEUTRAL", "flag_detail": "Solid, but he's not knocking anyone good out or anything. Decision fighter. Volk's training partner", "notes": null}, {"name": "Cong Wong", "weight_class": "Women's Fly <script>
const SUPABASE_URL = 'https://ljtdmceosmqdlehrlgvv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdGRtY2Vvc21xZGxlaHJsZ3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDEyMDMsImV4cCI6MjA4Nzk3NzIwM30.4VPTKVnYlGw9rIER7-zDvGRI-1xRJ9ndDcsTG0iF00I';
const H = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
const FIGHTERS = JSON.parse(document.getElementById('fighterData').textContent);

function log(msg, type) {
  type = type || 'info';
  var el = document.getElementById('log');
  var div = document.createElement('div');
  div.className = type;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  var btn = document.getElementById('runBtn');
  btn.disabled = true;
  log('Fetching existing fighters...');
  var res = await fetch(SUPABASE_URL + '/rest/v1/fighters?select=name', { headers: H });
  var existing = await res.json();
  var existingNames = new Set(existing.map(function(f){ return f.name.toLowerCase(); }));
  log('Found ' + existingNames.size + ' existing fighters in database.');
  var inserted = 0, skipped = 0, errors = 0;
  for (var i = 0; i < FIGHTERS.length; i++) {
    var f = FIGHTERS[i];
    document.getElementById('progress').textContent = 'Processing ' + (i+1) + ' / ' + FIGHTERS.length + '...';
    if (existingNames.has(f.name.toLowerCase())) {
      log('SKIP — ' + f.name + ' (already exists)', 'info');
      skipped++;
      continue;
    }
    try {
      var body = Object.assign({}, f, { created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
      var r = await fetch(SUPABASE_URL + '/rest/v1/fighters', {
        method: 'POST',
        headers: Object.assign({}, H, { 'Prefer': 'return=minimal' }),
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        var err = await r.text();
        log('ERROR — ' + f.name + ': ' + err, 'err');
        errors++;
      } else {
        log('OK — ' + f.name + ' (' + f.weight_class + ') ' + f.flag_type, 'ok');
        inserted++;
      }
    } catch(e) {
      log('ERROR — ' + f.name + ': ' + e.message, 'err');
      errors++;
    }
    await new Promise(function(resolve){ setTimeout(resolve, 100); });
  }
  document.getElementById('progress').textContent = 'Done. ' + inserted + ' inserted, ' + skipped + ' skipped, ' + errors + ' errors.';
  log('Import complete — ' + inserted + ' inserted, ' + skipped + ' skipped, ' + errors + ' errors.', 'ok');
  btn.disabled = false;
  btn.textContent = 'Done';
}
</script>
